services:
  anilibria-torznab:
    build:
      context: .
    image: anilibria-torznab:dev
    environment:
      API_KEY: ${API_KEY:?set API_KEY in the environment or .env}
    ports:
      - "${PORT:-8080}:8080"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 35s
    restart: unless-stopped
