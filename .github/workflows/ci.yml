name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Formatting
        run: test -z "$(gofmt -l .)"
      - name: Release helper checks
        run: |
          bash scripts/release/check-deployment-version.sh
          bash scripts/release/registry_test.sh
      - name: Tests
        run: go test ./...
      - name: Race tests
        run: go test -race ./...
      - name: Vet
        run: go vet ./...

  container:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Validate Compose configuration forwarding
        env:
          API_KEY: compose-validation-key
          IMAGE: ghcr.io/zenderg/anilibria-torznab:validation
          LISTEN_ADDR: ":9090"
          CONTAINER_PORT: "9090"
          PORT: "18080"
          REQUEST_TIMEOUT: 42s
          ANILIBRIA_API_BASE_URL: https://example.invalid/api/v1/
        shell: bash
        run: |
          for file in compose.yaml compose.release.yaml; do
            rendered=$(docker compose -f "$file" config --format json)
            environment=$(jq -c '.services["anilibria-torznab"].environment' <<< "$rendered")
            test "$(jq -r '.REQUEST_TIMEOUT' <<< "$environment")" = "42s"
            test "$(jq -r '.ANILIBRIA_API_BASE_URL' <<< "$environment")" = "https://example.invalid/api/v1/"
            test "$(jq -r '.LISTEN_ADDR' <<< "$environment")" = ":9090"
            test "$(jq -r '.LOG_LEVEL == null' <<< "$environment")" = "true"
            test "$(jq -r '.services["anilibria-torznab"].ports[0].target' <<< "$rendered")" = "9090"
            test "$(jq -r '.services["anilibria-torznab"].ports[0].published' <<< "$rendered")" = "18080"
          done
      - name: Build and smoke through Docker Compose
        env:
          API_KEY: ci-test-key
        shell: bash
        run: |
          docker compose config --quiet
          docker compose build \
            --build-arg VERSION=ci \
            --build-arg COMMIT=${GITHUB_SHA} \
            --build-arg BUILD_DATE=1970-01-01T00:00:00Z

          test "$(docker image inspect anilibria-torznab:dev --format '{{.Config.User}}')" = "65532:65532"

          docker compose up --detach --no-build
          trap 'docker compose logs; docker compose down --remove-orphans' EXIT
          id=$(docker compose ps --quiet anilibria-torznab)
          test -n "$id"
          test "$(docker inspect "$id" --format '{{.HostConfig.ReadonlyRootfs}}')" = "true"

          for attempt in $(seq 1 30); do
            status=$(docker inspect "$id" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}')
            case "$status" in
              healthy)
                exit 0
                ;;
              unhealthy|missing)
                echo "container health status: $status" >&2
                exit 1
                ;;
            esac
            sleep 1
          done

          echo "container did not become healthy" >&2
          exit 1
